<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Skill Shop - AI 智能体技能商店</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/ant-design-vue@4/dist/reset.css">
  <script src="https://unpkg.com/ant-design-vue@4/dist/antd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
    .app-container { min-height: 100vh; display: flex; flex-direction: column; }
    .app-header { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 64px; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .logo { display: flex; align-items: center; gap: 12px; font-size: 20px; font-weight: 700; color: #667eea; cursor: pointer; }
    .logo-icon { font-size: 28px; }
    .hero-section { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 80px 24px; text-align: center; color: white; }
    .hero-section h1 { font-size: 48px; margin-bottom: 16px; }
    .hero-section p { font-size: 18px; margin-bottom: 32px; opacity: 0.9; }
    .search-box { max-width: 600px; margin: 0 auto 24px; }
    .filter-tags { display: flex; justify-content: center; gap: 12px; }
    .skills-list { max-width: 1400px; margin: 0 auto; padding: 48px 24px; }
    .skills-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
    .skills-header h2 { font-size: 28px; color: #333; }
    .skill-card { cursor: pointer; transition: transform 0.3s; height: 100%; }
    .skill-card:hover { transform: translateY(-8px); }
    .skill-cover { height: 200px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; position: relative; }
    .skill-icon { font-size: 80px; }
    .free-tag, .price-tag { position: absolute; top: 16px; right: 16px; font-weight: 600; }
    .skill-title { font-size: 16px; font-weight: 600; color: #333; }
    .skill-desc { color: #666; font-size: 14px; line-height: 1.6; }
    .skill-meta { display: flex; justify-content: space-between; margin-top: 12px; color: #999; font-size: 13px; }
    .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; }
    .login-box { background: white; border-radius: 16px; padding: 48px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .login-header { text-align: center; margin-bottom: 32px; }
    .login-header h1 { font-size: 28px; color: #333; margin-bottom: 8px; }
    .login-header p { color: #666; font-size: 14px; }
    .login-footer { text-align: center; color: #666; font-size: 14px; margin-top: 16px; }
    .login-footer a { color: #667eea; text-decoration: none; margin-left: 8px; font-weight: 500; }
    .app-footer { background: #1a1a2e; color: white; padding: 48px 24px; text-align: center; }
    .app-footer p { margin: 8px 0; opacity: 0.8; }
  </style>
</head>
<body>
  <div id="app">
    <header class="app-header" v-if="showHeader">
      <div class="logo" @click="$router.push('/')">
        <span class="logo-icon">🛒</span>
        <span class="logo-text">Agent Skill Shop</span>
      </div>
      <div>
        <a-button v-if="isLoggedIn && isDeveloper" @click="$router.push('/upload')" style="margin-right: 8px">➕ 上传技能</a-button>
        <a-button type="primary" v-if="!isLoggedIn" @click="$router.push('/login')">登录</a-button>
        <a-button v-if="!isLoggedIn" style="margin-left: 8px" @click="$router.push('/register')">注册</a-button>
        <a-dropdown v-else>
          <a class="ant-dropdown-link" @click.prevent>
            <a-avatar :size="32">{{ user?.username?.[0]?.toUpperCase() }}</a-avatar>
            <span style="margin-left: 8px">{{ user?.username }}</span>
          </a>
          <template #overlay>
            <a-menu>
              <a-menu-item @click="handleLogout">🚪 退出登录</a-menu-item>
            </a-menu>
          </template>
        </a-dropdown>
      </div>
    </header>

    <router-view />

    <footer class="app-footer" v-if="showHeader">
      <p>© 2026 Titan Lab. All rights reserved.</p>
      <p>用 AI 解锁人类潜能的边界</p>
    </footer>
  </div>

  <script>
    const { createApp, ref, computed, onMounted } = Vue;
    const { createRouter, createWebHashHistory } = VueRouter;

    // API 配置
    const api = axios.create({
      baseURL: 'http://localhost:8001',
      timeout: 10000
    });

    api.interceptors.request.use(config => {
      const token = localStorage.getItem('token');
      if (token) config.headers.Authorization = `Bearer ${token}`;
      return config;
    });

    // 登录页面
    const Login = {
      template: `
        <div class="login-container">
          <div class="login-box">
            <div class="login-header">
              <h1>🛒 Agent Skill Shop</h1>
              <p>AI 智能体技能商店平台</p>
            </div>
            <a-form @finish="handleLogin" layout="vertical">
              <a-form-item name="email" :rules="[{ required: true, message: '请输入邮箱' }]">
                <a-input v-model:value="form.email" placeholder="邮箱" size="large" />
              </a-form-item>
              <a-form-item name="password" :rules="[{ required: true, message: '请输入密码' }]">
                <a-input-password v-model:value="form.password" placeholder="密码" size="large" />
              </a-form-item>
              <a-form-item>
                <a-button type="primary" html-type="submit" size="large" :loading="loading" block>
                  {{ loading ? '登录中...' : '登录' }}
                </a-button>
              </a-form-item>
              <div class="login-footer">
                <span>还没有账号？</span>
                <a @click="$router.push('/register')">立即注册</a>
              </div>
            </a-form>
          </div>
        </div>
      `,
      setup() {
        const form = ref({ email: '', password: '' });
        const loading = ref(false);

        const handleLogin = async () => {
          loading.value = true;
          try {
            const res = await api.post('/api/auth/login', form.value);
            localStorage.setItem('token', res.data.access_token);
            localStorage.setItem('user', JSON.stringify(res.data.user));
            message.success('登录成功！');
            router.push('/');
          } catch (e) {
            message.error(e.response?.data?.detail || '登录失败');
          } finally {
            loading.value = false;
          }
        };

        return { form, loading, handleLogin };
      }
    };

    // 注册页面
    const Register = {
      template: `
        <div class="login-container">
          <div class="login-box">
            <div class="login-header">
              <h1>🛒 注册账号</h1>
              <p>加入 Agent Skill Shop</p>
            </div>
            <a-form @finish="handleRegister" layout="vertical">
              <a-form-item name="username" :rules="[{ required: true, min: 3 }]">
                <a-input v-model:value="form.username" placeholder="用户名" size="large" />
              </a-form-item>
              <a-form-item name="email" :rules="[{ required: true, type: 'email' }]">
                <a-input v-model:value="form.email" placeholder="邮箱" size="large" />
              </a-form-item>
              <a-form-item name="password" :rules="[{ required: true, min: 6 }]">
                <a-input-password v-model:value="form.password" placeholder="密码" size="large" />
              </a-form-item>
              <a-form-item>
                <a-checkbox v-model:checked="form.isDeveloper">我是开发者</a-checkbox>
              </a-form-item>
              <a-form-item>
                <a-button type="primary" html-type="submit" size="large" :loading="loading" block>
                  {{ loading ? '注册中...' : '立即注册' }}
                </a-button>
              </a-form-item>
              <div class="login-footer">
                <span>已有账号？</span>
                <a @click="$router.push('/login')">立即登录</a>
              </div>
            </a-form>
          </div>
        </div>
      `,
      setup() {
        const form = ref({ username: '', email: '', password: '', isDeveloper: false });
        const loading = ref(false);

        const handleRegister = async () => {
          loading.value = true;
          try {
            await api.post('/api/auth/register', form.value);
            message.success('注册成功！请登录');
            router.push('/login');
          } catch (e) {
            message.error(e.response?.data?.detail || '注册失败');
          } finally {
            loading.value = false;
          }
        };

        return { form, loading, handleRegister };
      }
    };

    // 首页
    const Home = {
      template: `
        <div>
          <div class="hero-section">
            <h1>🚀 发现强大的 AI 技能</h1>
            <p>探索、购买、部署 AI 智能体技能</p>
            <div class="search-box">
              <a-input-search v-model:value="search" placeholder="搜索技能..." size="large" @search="loadSkills" />
            </div>
            <div class="filter-tags">
              <a-tag :color="filter==='all'?'blue':''" @click="filter='all';loadSkills()" style="cursor:pointer">全部</a-tag>
              <a-tag :color="filter==='free'?'green':''" @click="filter='free';loadSkills()" style="cursor:pointer">🆓 免费</a-tag>
              <a-tag :color="filter==='paid'?'orange':''" @click="filter='paid';loadSkills()" style="cursor:pointer">💰 付费</a-tag>
            </div>
          </div>
          <div class="skills-list">
            <div class="skills-header">
              <h2>热门技能</h2>
            </div>
            <a-row :gutter="[24,24]">
              <a-col v-for="skill in skills" :key="skill.id" :xs="24" :sm="12" :md="8" :lg="6">
                <a-card hoverable class="skill-card" @click="goToDetail(skill.id)">
                  <template #cover>
                    <div class="skill-cover">
                      <span class="skill-icon">🤖</span>
                      <a-tag v-if="skill.is_free" color="green" class="free-tag">免费</a-tag>
                      <a-tag v-else color="orange" class="price-tag">¥{{ skill.price }}</a-tag>
                    </div>
                  </template>
                  <a-card-meta :title="skill.name" :description="skill.description">
                    <template #description>
                      <p class="skill-desc">{{ skill.description }}</p>
                      <div class="skill-meta">
                        <span>📥 {{ skill.download_count }}</span>
                        <span>⭐ {{ skill.rating?.toFixed(1) || '0.0' }}</span>
                      </div>
                    </template>
                  </a-card-meta>
                </a-card>
              </a-col>
            </a-row>
            <a-empty v-if="skills.length===0 && !loading" description="暂无技能" />
            <div v-if="loading" style="text-align:center;padding:60px 0"><a-spin size="large" /></div>
          </div>
        </div>
      `,
      setup() {
        const skills = ref([]);
        const loading = ref(false);
        const search = ref('');
        const filter = ref('all');

        const loadSkills = async () => {
          loading.value = true;
          try {
            const params = { skip: 0, limit: 20 };
            if (filter.value === 'free') params.is_free = true;
            else if (filter.value === 'paid') params.is_free = false;
            if (search.value) params.search = search.value;
            const res = await api.get('/api/skills', { params });
            skills.value = res.data.items || [];
          } catch (e) {
            console.error(e);
          } finally {
            loading.value = false;
          }
        };

        const goToDetail = (skillId) => {
          window.location.hash = '/skill/' + skillId;
        };

        onMounted(loadSkills);
        return { skills, loading, search, filter, loadSkills, goToDetail };
      }
    };

    const routes = [
      { path: '/', component: Home },
      { path: '/login', component: Login },
      { path: '/register', component: Register }
    ];

    const router = createRouter({
      history: createWebHashHistory(),
      routes
    });

    const { message } = antd;

    const app = createApp({
      setup() {
        const user = ref(null);
        const isDeveloper = ref(false);
        const showHeader = computed(() => {
          const hash = window.location.hash;
          return !hash.includes('login') && !hash.includes('register');
        });
        const isLoggedIn = computed(() => !!localStorage.getItem('token'));

        const handleLogout = () => {
          localStorage.removeItem('token');
          localStorage.removeItem('user');
          user.value = null;
          isDeveloper.value = false;
          message.success('已退出登录');
          window.location.hash = '/';
        };

        const loadUser = () => {
          const userStr = localStorage.getItem('user');
          if (userStr) {
            user.value = JSON.parse(userStr);
            isDeveloper.value = user.value.is_developer || false;
          }
        };

        onMounted(loadUser);

        return { user, isDeveloper, showHeader, isLoggedIn, handleLogout };
      }
    });

    app.use(router);
    app.use(antd);
    app.mount('#app');
  </script>
</body>
</html>
