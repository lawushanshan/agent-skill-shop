<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>上传技能 - Agent Skill Shop</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/ant-design-vue@4/dist/reset.css">
  <script src="https://unpkg.com/ant-design-vue@4/dist/antd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
    .upload-skill { max-width: 1000px; margin: 0 auto; padding: 24px; }
    .upload-header { text-align: center; margin-bottom: 32px; }
    .upload-header h1 { font-size: 32px; color: #333; margin-bottom: 8px; }
    .upload-header p { color: #666; font-size: 16px; }
    .app-header { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 64px; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 24px; }
    .logo { display: flex; align-items: center; gap: 12px; font-size: 20px; font-weight: 700; color: #667eea; cursor: pointer; }
    .mb-24 { margin-bottom: 24px; }
  </style>
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="logo" @click="$router.push('/')">
        <span class="logo-icon">🛒</span>
        <span class="logo-text">Agent Skill Shop</span>
      </div>
      <a-button @click="$router.push('/')">← 返回</a-button>
    </header>

    <div class="upload-skill" v-if="isLoggedIn">
      <div class="upload-header">
        <h1>➕ 上传技能</h1>
        <p>分享你的 AI 技能，帮助开发者，获得收益</p>
      </div>

      <a-card>
        <a-form @finish="handleSubmit" layout="vertical">
          <a-row :gutter="24">
            <a-col :span="12">
              <a-form-item label="技能名称" name="name" :rules="[{ required: true, message: '请输入技能名称' }]">
                <a-input v-model:value="form.name" placeholder="例如：智能客服助手" size="large" />
              </a-form-item>
            </a-col>

            <a-col :span="12">
              <a-form-item label="技能分类" name="category" :rules="[{ required: true, message: '请选择技能分类' }]">
                <a-select v-model:value="form.category" placeholder="选择分类" size="large">
                  <a-select-option value="nlp">📝 自然语言处理</a-select-option>
                  <a-select-option value="vision">👁️ 计算机视觉</a-select-option>
                  <a-select-option value="data">📊 数据分析</a-select-option>
                  <a-select-option value="automation">🤖 自动化</a-select-option>
                  <a-select-option value="other">其他</a-select-option>
                </a-select>
              </a-form-item>
            </a-col>
          </a-row>

          <a-form-item label="技能描述" name="description" :rules="[{ required: true, message: '请输入技能描述' }]">
            <a-textarea v-model:value="form.description" placeholder="请详细描述技能的功能和使用场景" :rows="4" size="large" />
          </a-form-item>

          <a-row :gutter="24">
            <a-col :span="12">
              <a-form-item label="技能版本" name="version" :rules="[{ required: true, message: '请输入版本号' }]">
                <a-input v-model:value="form.version" placeholder="1.0.0" size="large" />
              </a-form-item>
            </a-col>

            <a-col :span="12">
              <a-form-item label="作者名称" name="author">
                <a-input v-model:value="form.author" placeholder="你的名称或团队名" size="large" />
              </a-form-item>
            </a-col>
          </a-row>

          <a-row :gutter="24">
            <a-col :span="12">
              <a-form-item label="是否免费" name="is_free">
                <a-radio-group v-model:value="form.is_free">
                  <a-radio :value="true">🆓 免费</a-radio>
                  <a-radio :value="false">💰 付费</a-radio>
                </a-radio-group>
              </a-form-item>
            </a-col>

            <a-col :span="12" v-if="!form.is_free">
              <a-form-item label="价格 (元)" name="price" :rules="[{ required: true, message: '请输入价格' }]">
                <a-input-number v-model:value="form.price" :min="0" :precision="2" style="width: 100%" size="large" />
              </a-form-item>
            </a-col>
          </a-row>

          <a-form-item label="GitHub 仓库" name="repository">
            <a-input v-model:value="form.repository" placeholder="https://github.com/username/repo" size="large" />
          </a-form-item>

          <a-form-item label="文档链接" name="documentation">
            <a-input v-model:value="form.documentation" placeholder="https://your-docs-url.com" size="large" />
          </a-form-item>

          <a-form-item label="标签" name="tags">
            <a-select v-model:value="form.tags" mode="tags" placeholder="输入标签后按回车，例如：AI、NLP、客服" size="large" />
          </a-form-item>

          <a-form-item>
            <a-checkbox v-model:checked="form.agree">我承诺此技能为原创或已获授权，符合平台规范</a-checkbox>
          </a-form-item>

          <a-form-item>
            <a-button type="primary" html-type="submit" size="large" :loading="loading" :disabled="!form.agree">
              {{ loading ? '提交中...' : '提交技能' }}
            </a-button>
          </a-form-item>
        </a-form>
      </a-card>

      <a-alert
        message="💡 收益说明"
        description="付费技能：平台抽成 20%，开发者获得 80% 收益。免费技能：提升知名度和影响力。"
        type="info"
        show-icon
        style="margin-top: 24px"
      />
    </div>

    <div v-else style="text-align: center; padding: 100px 0;">
      <a-result status="401" title="请先登录" sub-title="登录后才能上传技能">
        <template #extra>
          <a-button type="primary" @click="$router.push('/login')">去登录</a-button>
        </template>
      </a-result>
    </div>
  </div>

  <script>
    const { createApp, ref, onMounted } = Vue;
    const { message } = antd;

    const api = axios.create({
      baseURL: 'http://localhost:8001',
      timeout: 10000
    });

    api.interceptors.request.use(config => {
      const token = localStorage.getItem('token');
      if (token) config.headers.Authorization = `Bearer ${token}`;
      return config;
    });

    const app = createApp({
      setup() {
        const isLoggedIn = ref(false);
        const loading = ref(false);
        const form = ref({
          name: '',
          description: '',
          category: '',
          version: '1.0.0',
          author: '',
          is_free: true,
          price: 0,
          repository: '',
          documentation: '',
          tags: [],
          agree: false
        });

        const checkLogin = () => {
          const token = localStorage.getItem('token');
          if (!token) {
            isLoggedIn.value = false;
          } else {
            isLoggedIn.value = true;
          }
        };

        const handleSubmit = async () => {
          loading.value = true;
          try {
            const skillData = {
              ...form.value,
              price: form.value.is_free ? 0 : form.value.price
            };
            const res = await api.post('/api/skills', skillData);
            message.success('技能提交成功！等待审核后上架');
            window.location.hash = '/';
          } catch (e) {
            message.error(e.response?.data?.detail || '提交失败');
          } finally {
            loading.value = false;
          }
        };

        onMounted(checkLogin);

        return { isLoggedIn, loading, form, handleSubmit };
      }
    });

    app.use(antd);
    app.mount('#app');
  </script>
</body>
</html>
